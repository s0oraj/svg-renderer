<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f0f0f0"/>
  
  <!-- Rectangle -->
  <rect x="20" y="20" width="80" height="60" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Circle -->
  <circle cx="150" cy="50" r="30" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  
  <!-- Ellipse -->
  <ellipse cx="100" cy="130" rx="50" ry="30" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  
  <!-- Line -->
  <line x1="20" y1="170" x2="100" y2="170" stroke="#9b59b6" stroke-width="3"/>
  
  <!-- Polygon (triangle) -->
  <polygon points="150,100 180,160 120,160" fill="#f39c12" stroke="#d68910" stroke-width="2"/>
  
  <!-- Text -->
  <text x="100" y="190" font-size="16" font-family="Arial" fill="#2c3e50" text-anchor="middle">SVG Test</text>
</svg>
