<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ragGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="agentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7B68EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A4BA3;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bgGradient)"/>

  <!-- Title Section -->
  <rect x="0" y="0" width="1400" height="100" fill="#2C3E50" opacity="0.95"/>
  <text x="700" y="55" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">RAG vs Agentic AI</text>
  <text x="700" y="85" font-size="18" fill="#B0BEC5" text-anchor="middle" font-family="Arial, sans-serif">Understanding Different AI Architectures</text>

  <!-- ============== LEFT SIDE: RAG ============== -->
  
  <!-- RAG Container -->
  <g id="rag-section">
    <!-- Header -->
    <rect x="50" y="130" width="580" height="50" fill="url(#ragGradient)" rx="8" filter="url(#shadow)"/>
    <text x="340" y="165" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">Retrieval-Augmented Generation (RAG)</text>

    <!-- Description -->
    <rect x="50" y="195" width="580" height="60" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" rx="6" opacity="0.9"/>
    <text x="70" y="215" font-size="14" fill="#333" font-family="Arial, sans-serif" font-weight="bold">Focus: Retrieve relevant data then generate</text>
    <text x="70" y="238" font-size="12" fill="#666" font-family="Arial, sans-serif">Retrieves documents → Processes with LLM → Outputs answer</text>

    <!-- Step 1: Knowledge Base -->
    <g>
      <rect x="70" y="290" width="140" height="100" fill="#E3F2FD" stroke="#4A90E2" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="140" y="320" font-size="16" font-weight="bold" fill="#2E5C8A" text-anchor="middle" font-family="Arial, sans-serif">Knowledge Base</text>
      <text x="140" y="345" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Documents</text>
      <text x="140" y="360" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">PDFs, DBs</text>
      <text x="140" y="375" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Web Pages</text>
    </g>

    <!-- Step 2: Retrieval -->
    <g>
      <rect x="280" y="290" width="140" height="100" fill="#BBE9F7" stroke="#4A90E2" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="350" y="320" font-size="16" font-weight="bold" fill="#2E5C8A" text-anchor="middle" font-family="Arial, sans-serif">Retrieval</text>
      <text x="350" y="345" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Semantic Search</text>
      <text x="350" y="360" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Vector DB</text>
      <text x="350" y="375" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Embeddings</text>
    </g>

    <!-- Step 3: LLM Processing -->
    <g>
      <rect x="490" y="290" width="140" height="100" fill="#87CEEB" stroke="#4A90E2" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="560" y="320" font-size="16" font-weight="bold" fill="#2E5C8A" text-anchor="middle" font-family="Arial, sans-serif">LLM Process</text>
      <text x="560" y="345" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Context + Query</text>
      <text x="560" y="360" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Generate</text>
      <text x="560" y="375" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Response</text>
    </g>

    <!-- Arrows between steps -->
    <path d="M 210 340 L 280 340" stroke="#4A90E2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 420 340 L 490 340" stroke="#4A90E2" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

    <!-- Query Input -->
    <g>
      <rect x="70" y="450" width="560" height="60" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="350" y="470" font-size="14" font-weight="bold" fill="#333" text-anchor="middle" font-family="Arial, sans-serif">User Query / Question</text>
      <text x="350" y="498" font-size="12" fill="#666" text-anchor="middle" font-family="Arial, sans-serif">Enters at retrieval stage - Static knowledge base doesn't change</text>
    </g>

    <!-- Output -->
    <g>
      <rect x="70" y="560" width="560" height="80" fill="#C8E6C9" stroke="#66BB6A" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="350" y="585" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="Arial, sans-serif">Generated Response</text>
      <text x="350" y="610" font-size="12" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Direct answer based on retrieved context</text>
      <text x="350" y="630" font-size="11" fill="#666" text-anchor="middle" font-family="Arial, sans-serif">No iteration or tool calling</text>
    </g>

    <!-- Characteristics -->
    <g>
      <rect x="70" y="680" width="560" height="130" fill="#f5f5f5" stroke="#999" stroke-width="1" rx="6"/>
      <text x="350" y="705" font-size="14" font-weight="bold" fill="#333" text-anchor="middle" font-family="Arial, sans-serif">Key Characteristics</text>
      
      <text x="90" y="735" font-size="12" fill="#333" font-family="Arial, sans-serif">✓ Fast and deterministic</text>
      <text x="90" y="760" font-size="12" fill="#333" font-family="Arial, sans-serif">✓ Grounded in specific documents</text>
      <text x="90" y="785" font-size="12" fill="#333" font-family="Arial, sans-serif">✗ Can't execute actions or use tools</text>
      
      <text x="380" y="735" font-size="12" fill="#333" font-family="Arial, sans-serif">✓ Lower computational cost</text>
      <text x="380" y="760" font-size="12" fill="#333" font-family="Arial, sans-serif">✗ Limited to retrieval logic</text>
      <text x="380" y="785" font-size="12" fill="#333" font-family="Arial, sans-serif">✗ Can't learn or adapt</text>
    </g>
  </g>

  <!-- ============== RIGHT SIDE: AGENTIC AI ============== -->

  <!-- Agentic Container -->
  <g id="agentic-section">
    <!-- Header -->
    <rect x="770" y="130" width="580" height="50" fill="url(#agentGradient)" rx="8" filter="url(#shadow)"/>
    <text x="1060" y="165" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">Agentic AI</text>

    <!-- Description -->
    <rect x="770" y="195" width="580" height="60" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" rx="6" opacity="0.9"/>
    <text x="790" y="215" font-size="14" fill="#333" font-family="Arial, sans-serif" font-weight="bold">Focus: Autonomous reasoning and tool use</text>
    <text x="790" y="238" font-size="12" fill="#666" font-family="Arial, sans-serif">Plans → Uses tools → Iterates → Learns from feedback</text>

    <!-- Planning -->
    <g>
      <rect x="790" y="290" width="140" height="100" fill="#E1BEE7" stroke="#7B68EE" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="860" y="320" font-size="16" font-weight="bold" fill="#5A4BA3" text-anchor="middle" font-family="Arial, sans-serif">Planning</text>
      <text x="860" y="345" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Reason about</text>
      <text x="860" y="360" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Task breakdown</text>
      <text x="860" y="375" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Strategy</text>
    </g>

    <!-- Tool Selection -->
    <g>
      <rect x="1000" y="290" width="140" height="100" fill="#CE93D8" stroke="#7B68EE" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="1070" y="320" font-size="16" font-weight="bold" fill="#5A4BA3" text-anchor="middle" font-family="Arial, sans-serif">Tool Use</text>
      <text x="1070" y="345" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">API Calls</text>
      <text x="1070" y="360" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Code Execution</text>
      <text x="1070" y="375" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">External Tools</text>
    </g>

    <!-- Observation & Iteration -->
    <g>
      <rect x="1210" y="290" width="140" height="100" fill="#BA68C8" stroke="#7B68EE" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="1280" y="320" font-size="16" font-weight="bold" fill="#5A4BA3" text-anchor="middle" font-family="Arial, sans-serif">Iteration</text>
      <text x="1280" y="345" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Observe Results</text>
      <text x="1280" y="360" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Refine Plan</text>
      <text x="1280" y="375" font-size="11" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Loop Back</text>
    </g>

    <!-- Arrows with loop back -->
    <path d="M 930 340 L 1000 340" stroke="#7B68EE" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M 1140 340 L 1210 340" stroke="#7B68EE" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <!-- Loop back arrow -->
    <path d="M 1280 390 Q 1060 440 860 390" stroke="#7B68EE" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>

    <!-- Initial Goal -->
    <g>
      <rect x="790" y="450" width="560" height="60" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="1070" y="470" font-size="14" font-weight="bold" fill="#333" text-anchor="middle" font-family="Arial, sans-serif">Goal / Complex Task</text>
      <text x="1070" y="498" font-size="12" fill="#666" text-anchor="middle" font-family="Arial, sans-serif">Autonomously breaks down and solves problems</text>
    </g>

    <!-- Final Output -->
    <g>
      <rect x="790" y="560" width="560" height="80" fill="#C8E6C9" stroke="#66BB6A" stroke-width="2" rx="8" filter="url(#shadow)"/>
      <text x="1070" y="585" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="Arial, sans-serif">Solution with Reasoning</text>
      <text x="1070" y="610" font-size="12" fill="#555" text-anchor="middle" font-family="Arial, sans-serif">Multi-step execution with tool integration</text>
      <text x="1070" y="630" font-size="11" fill="#666" text-anchor="middle" font-family="Arial, sans-serif">Can handle complex, dynamic problems</text>
    </g>

    <!-- Characteristics -->
    <g>
      <rect x="790" y="680" width="560" height="130" fill="#f5f5f5" stroke="#999" stroke-width="1" rx="6"/>
      <text x="1070" y="705" font-size="14" font-weight="bold" fill="#333" text-anchor="middle" font-family="Arial, sans-serif">Key Characteristics</text>
      
      <text x="810" y="735" font-size="12" fill="#333" font-family="Arial, sans-serif">✓ Autonomous reasoning & planning</text>
      <text x="810" y="760" font-size="12" fill="#333" font-family="Arial, sans-serif">✓ Can use external tools & APIs</text>
      <text x="810" y="785" font-size="12" fill="#333" font-family="Arial, sans-serif">✓ Iterative problem solving</text>
      
      <text x="1100" y="735" font-size="12" fill="#333" font-family="Arial, sans-serif">✗ More complex & slower</text>
      <text x="1100" y="760" font-size="12" fill="#333" font-family="Arial, sans-serif">✗ Higher computational cost</text>
      <text x="1100" y="785" font-size="12" fill="#333" font-family="Arial, sans-serif">✗ Can be unpredictable</text>
    </g>
  </g>

  <!-- ============== FOOTER COMPARISON ============== -->
  
  <!-- Comparison Table -->
  <g id="comparison">
    <text x="700" y="860" font-size="16" font-weight="bold" fill="#2C3E50" text-anchor="middle" font-family="Arial, sans-serif">Use RAG for document QA | Use Agentic AI for complex multi-step tasks</text>
  </g>
</svg>
